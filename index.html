<!-- I am only showing the MODDED parts to keep this readable -->

<script>

// ===== NEW SYSTEMS =====
const WEAPONS = [
 { name:"Pistol",damage:20,ammo:12 },
 { name:"Shotgun",damage:45,ammo:6 },
 { name:"SMG",damage:10,ammo:30 },
 { name:"Rifle",damage:18,ammo:25 },
 { name:"AK",damage:22,ammo:30 },
 { name:"Sniper",damage:80,ammo:5 },
 { name:"LMG",damage:14,ammo:60 },
 { name:"Revolver",damage:30,ammo:6 },
 { name:"Deagle",damage:35,ammo:7 },
 { name:"Uzi",damage:9,ammo:32 },
 { name:"Burst Rifle",damage:16,ammo:24 },
 { name:"Crossbow",damage:50,ammo:8 },
 { name:"Railgun",damage:95,ammo:3 },
 { name:"Flamethrower",damage:6,ammo:80 },
 { name:"Laser",damage:12,ammo:60 },
 { name:"Rocket Launcher",damage:110,ammo:2 },
 { name:"Minigun",damage:8,ammo:120 },
 { name:"Plasma Rifle",damage:24,ammo:28 },
 { name:"Sawed-Off",damage:50,ammo:4 },
 { name:"Tactical Rifle",damage:20,ammo:24 }
];

let weaponAmmo = {};
let thirdPerson = false;
let scoped = false;

// ===== CONTROLS =====
document.addEventListener('keydown', e=>{
 if(e.code==="Comma") thirdPerson = !thirdPerson;
});

document.addEventListener('mousedown', e=>{
 if(e.button===2) scoped = true;
});

document.addEventListener('mouseup', e=>{
 if(e.button===2) scoped = false;
});

// ===== CAMERA MOD =====
function updateCamera(){
 if(scoped){
  camera.fov = 30;
 } else {
  camera.fov = 70;
 }
 camera.updateProjectionMatrix();

 if(thirdPerson){
  let dist = 6;
  camera.position.set(
   yaw.position.x - Math.sin(yaw.rotation.y)*dist,
   yaw.position.y + 3,
   yaw.position.z - Math.cos(yaw.rotation.y)*dist
  );
  camera.lookAt(yaw.position.x,yaw.position.y+1.5,yaw.position.z);
 }
}

// ===== LOOT UPGRADE =====
function spawnLoot(x,y,z){
 let isAmmo = Math.random()<0.3;

 const geo=new THREE.BoxGeometry(1.5,1.5,1.5);
 const mat=new THREE.MeshStandardMaterial({
  color:isAmmo?0xffff00:0x00ffff,
  emissive:isAmmo?0xffff00:0x00ffff,
  emissiveIntensity:0.2
 });

 const mesh=new THREE.Mesh(geo,mat);
 mesh.position.set(x,y,z);
 mesh.userData={baseY:y,offset:Math.random()*Math.PI*2};

 scene.add(mesh);

 if(isAmmo){
  lootItems.push({mesh,type:"AmmoBox"});
 }else{
  let w=WEAPONS[Math.floor(Math.random()*WEAPONS.length)];
  lootItems.push({mesh,type:w.name});
 }
}

// ===== INVENTORY UPGRADE =====
function addToInventory(item){

 if(item==="AmmoBox"){
  Object.keys(weaponAmmo).forEach(w=>weaponAmmo[w]+=20);
  showNotify("AMMO REFILLED!");
  return;
 }

 if(!weaponAmmo[item]){
  let def=WEAPONS.find(w=>w.name===item);
  weaponAmmo[item]=def?def.ammo:20;
 }

 let emptyHot=hotbar.indexOf(null);
 if(emptyHot!==-1) hotbar[emptyHot]=item;
 else{
  let emptyInv=inventory.indexOf(null);
  if(emptyInv!==-1) inventory[emptyInv]=item;
 }

 showNotify("GOT "+item);
 updateUI();
}

// ===== SHOOT UPGRADE =====
function shoot(){
 const weaponName=hotbar[activeSlot];
 if(!weaponName) return;

 if(!weaponAmmo[weaponName]||weaponAmmo[weaponName]<=0){
  showNotify("NO AMMO!");
  return;
 }

 weaponAmmo[weaponName]--;

 const def=WEAPONS.find(w=>w.name===weaponName);
 let dmg=def?def.damage:20;

 gunMuzzle.intensity=8;
 setTimeout(()=>gunMuzzle.intensity=0,50);

 const b=new THREE.Mesh(
  new THREE.CylinderGeometry(0.05,0.05,1),
  new THREE.MeshBasicMaterial({color:0xffddaa})
 );

 camera.getWorldPosition(b.position);
 const dir=new THREE.Vector3();
 camera.getWorldDirection(dir);

 b.quaternion.copy(camera.quaternion);

 scene.add(b);
 bullets.push({mesh:b,dir:dir,life:60,damage:dmg});
}

// ===== BULLET DAMAGE FIX =====
// find this line:
// z.hp -= 20;
// replace with:
z.hp -= b.damage;

// ===== LOOP ADD =====
// inside loop BEFORE render:
updateCamera();

</script>
